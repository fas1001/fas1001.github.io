<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 980" width="700" height="980" role="img" aria-labelledby="title desc">
  <title id="title">Vertical row-by-row prompting workflow</title>
  <desc id="desc">A text cell is read, sent to a model, then the returned rating is placed in the review column.</desc>
  <defs>
    <linearGradient id="cardBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef7f9"/>
      <stop offset="100%" stop-color="#d6eaee"/>
    </linearGradient>
    <linearGradient id="cardGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff6d8"/>
      <stop offset="100%" stop-color="#f2e3a4"/>
    </linearGradient>
    <linearGradient id="cardGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ebf5e8"/>
      <stop offset="100%" stop-color="#cfe5c8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#40666e" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="7" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L13,7 L1,13 z" fill="#40666e"/>
    </marker>
    <style>
      .label { font: 700 28px Arial, sans-serif; fill: #24444b; }
      .body { font: 400 26px Arial, sans-serif; fill: #355c66; }
      .small { font: 400 22px Arial, sans-serif; fill: #355c66; }
      .value { font: 700 54px Arial, sans-serif; fill: #2f5b33; }
      .arrowText { font: 700 22px Arial, sans-serif; fill: #40666e; }
    </style>
  </defs>

  <rect x="0" y="0" width="700" height="980" rx="30" fill="#ffffff"/>

  <rect x="90" y="40" width="520" height="210" rx="26" fill="url(#cardBlue)" stroke="#b6d5db" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="95" class="label">Row 1, text column</text>
  <text x="130" y="155" class="body">"Very good!"</text>
  <text x="130" y="210" class="small">Read cell to analyze</text>

  <line x1="350" y1="270" x2="350" y2="360" stroke="#40666e" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="385" y="325" class="arrowText">send to model</text>

  <rect x="90" y="380" width="520" height="230" rx="26" fill="url(#cardGold)" stroke="#dec98a" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="440" class="label">Prompt to LLM</text>
  <text x="130" y="500" class="body">"Give a rating from 1 to 5</text>
  <text x="130" y="540" class="body">for this review"</text>
  <text x="130" y="590" class="small">Model produces a response</text>

  <line x1="350" y1="630" x2="350" y2="720" stroke="#40666e" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="390" y="685" class="arrowText">return</text>

  <rect x="90" y="740" width="520" height="180" rx="26" fill="url(#cardGreen)" stroke="#b9d3b4" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="800" class="label">Row 1, review column</text>
  <text x="130" y="865" class="value">5</text>
  <text x="220" y="865" class="small">The response is placed</text>
  <text x="130" y="900" class="small">in the correct table cell</text>
</svg>
