<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" width="1200" height="550">
<defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
        <feOffset dx="2" dy="2" result="offsetblur" />
        <feComponentTransfer>
            <feFuncA type="linear" slope="0.2"/>
        </feComponentTransfer>
        <feMerge>
            <feMergeNode />
            <feMergeNode in="SourceGraphic" />
        </feMerge>
    </filter>
</defs>
<text x="300" y="40" font-family="sans-serif" font-size="20" fill="#f97316" font-weight="bold" text-anchor="middle">Social Dimension</text><text x="900" y="40" font-family="sans-serif" font-size="20" fill="#3b82f6" font-weight="bold" text-anchor="middle">Economic Dimension</text><rect x="20" y="70" width="560" height="100" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)" /><text x="35" y="95" font-family="sans-serif" font-size="14" fill="#1e293b" font-weight="bold">Assimilation</text><text x="35" y="120" font-family="sans-serif" font-size="13" fill="#475569">Too many immigrants simply do not want to integrate</text><text x="35" y="140" font-family="sans-serif" font-size="13" fill="#475569">into Canadian society.</text><rect x="620" y="70" width="560" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" /><text x="635" y="95" font-family="sans-serif" font-size="14" fill="#1e293b" font-weight="bold">Standard of living</text><text x="635" y="120" font-family="sans-serif" font-size="13" fill="#475569">The government should: ensure that everyone has a</text><text x="635" y="140" font-family="sans-serif" font-size="13" fill="#475569">decent standard of living OR leave people to get by</text><text x="635" y="160" font-family="sans-serif" font-size="13" fill="#475569">on their own.</text><rect x="20" y="185" width="560" height="100" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)" /><text x="35" y="210" font-family="sans-serif" font-size="14" fill="#1e293b" font-weight="bold">Admission</text><text x="35" y="235" font-family="sans-serif" font-size="13" fill="#475569">Do you think Canada should admit more immigrants,</text><text x="35" y="255" font-family="sans-serif" font-size="13" fill="#475569">fewer immigrants, or about the same number?</text><rect x="620" y="185" width="560" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" /><text x="635" y="210" font-family="sans-serif" font-size="14" fill="#1e293b" font-weight="bold">Inequalities</text><text x="635" y="235" font-family="sans-serif" font-size="13" fill="#475569">The government should do more to reduce</text><text x="635" y="255" font-family="sans-serif" font-size="13" fill="#475569">the income gap between the rich and the poor.</text><rect x="20" y="300" width="560" height="100" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)" /><text x="35" y="325" font-family="sans-serif" font-size="14" fill="#1e293b" font-weight="bold">Equal rights</text><text x="35" y="350" font-family="sans-serif" font-size="13" fill="#475569">We have gone too far in promoting equal</text><text x="35" y="370" font-family="sans-serif" font-size="13" fill="#475569">rights in this country.</text><rect x="620" y="300" width="560" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" /><text x="635" y="325" font-family="sans-serif" font-size="14" fill="#1e293b" font-weight="bold">Responsibility</text><text x="635" y="350" font-family="sans-serif" font-size="13" fill="#475569">People who do not succeed should blame</text><text x="635" y="370" font-family="sans-serif" font-size="13" fill="#475569">themselves, not the system.</text><rect x="20" y="415" width="560" height="100" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)" /><text x="35" y="440" font-family="sans-serif" font-size="14" fill="#1e293b" font-weight="bold">Same-sex marriage</text><text x="35" y="465" font-family="sans-serif" font-size="13" fill="#475569">Same-sex couples should have the right to</text><text x="35" y="485" font-family="sans-serif" font-size="13" fill="#475569">marry legally.</text><rect x="620" y="415" width="560" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" /><text x="635" y="440" font-family="sans-serif" font-size="14" fill="#1e293b" font-weight="bold">Environment</text><text x="635" y="465" font-family="sans-serif" font-size="13" fill="#475569">Protecting the environment is more important than</text><text x="635" y="485" font-family="sans-serif" font-size="13" fill="#475569">creating jobs.</text></svg>
